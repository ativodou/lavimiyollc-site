<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E75B6"/>
      <stop offset="100%" stop-color="#3498DB"/>
    </linearGradient>
    <!-- Gear pattern for background texture -->
    <pattern id="gearPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="25" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
      <circle cx="60" cy="60" r="15" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
      <!-- Gear teeth hints -->
      <rect x="57" y="30" width="6" height="12" rx="1" fill="#ffffff" opacity="0.03"/>
      <rect x="57" y="78" width="6" height="12" rx="1" fill="#ffffff" opacity="0.03"/>
      <rect x="30" y="57" width="12" height="6" rx="1" fill="#ffffff" opacity="0.03"/>
      <rect x="78" y="57" width="12" height="6" rx="1" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bgGrad)"/>
  <rect width="600" height="900" fill="url(#gearPattern)"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="600" height="6" fill="url(#redBar)"/>

  <!-- Series identifier -->
  <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#888" font-weight="bold" letter-spacing="6">SERI LIV MEKANIK AN KREYÒL AYISYEN</text>

  <!-- Main K-VOUM title -->
  <text x="300" y="145" text-anchor="middle" font-family="Arial Black, Arial" font-size="90" fill="#ffffff" font-weight="900" letter-spacing="8">K-VOUM</text>
  
  <!-- Tagline right under K-VOUM -->
  <text x="300" y="172" text-anchor="middle" font-family="Arial" font-size="18" fill="#E74C3C" font-weight="bold" font-style="italic">Mekanisyen sou bon ray</text>

  <!-- Red underline -->
  <rect x="150" y="185" width="300" height="4" rx="2" fill="url(#redBar)"/>

  <!-- Volume number -->
  <rect x="200" y="200" width="200" height="40" rx="20" fill="none" stroke="#2E75B6" stroke-width="2"/>
  <text x="300" y="227" text-anchor="middle" font-family="Arial" font-size="20" fill="#2E75B6" font-weight="bold">VOLIM 1</text>

  <!-- Central illustration area - Engine/wrench schematic -->
  <g transform="translate(300, 420)" opacity="0.95">
    <!-- Large gear background -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#2E75B6" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#2E75B6" stroke-width="1" opacity="0.2"/>
    
    <!-- Gear teeth -->
    <g opacity="0.25" fill="#2E75B6">
      <rect x="-8" y="-140" width="16" height="20" rx="3"/>
      <rect x="-8" y="120" width="16" height="20" rx="3"/>
      <rect x="-140" y="-8" width="20" height="16" rx="3"/>
      <rect x="120" y="-8" width="20" height="16" rx="3"/>
      <rect x="86" y="-104" width="16" height="20" rx="3" transform="rotate(30, 94, -94)"/>
      <rect x="-102" y="-104" width="16" height="20" rx="3" transform="rotate(-30, -94, -94)"/>
      <rect x="86" y="84" width="16" height="20" rx="3" transform="rotate(-30, 94, 94)"/>
      <rect x="-102" y="84" width="16" height="20" rx="3" transform="rotate(30, -94, 94)"/>
    </g>

    <!-- Wrench icon -->
    <g transform="rotate(-45)" opacity="0.9">
      <rect x="-12" y="-80" width="24" height="130" rx="6" fill="#E8E8E8"/>
      <rect x="-18" y="-80" width="36" height="30" rx="4" fill="#CCCCCC"/>
      <rect x="-6" y="-82" width="12" height="34" rx="2" fill="#1a1a2e"/>
      <!-- Wrench jaw -->
      <rect x="-22" y="38" width="44" height="25" rx="4" fill="#CCCCCC"/>
      <rect x="-12" y="36" width="24" height="8" rx="2" fill="#1a1a2e"/>
    </g>

    <!-- Piston icon overlay -->
    <g transform="translate(50, -20)" opacity="0.8">
      <rect x="-18" y="-35" width="36" height="50" rx="3" fill="none" stroke="#E74C3C" stroke-width="2"/>
      <!-- Piston rings -->
      <line x1="-18" y1="-22" x2="18" y2="-22" stroke="#E74C3C" stroke-width="1.5"/>
      <line x1="-18" y1="-14" x2="18" y2="-14" stroke="#E74C3C" stroke-width="1.5"/>
      <!-- Connecting rod -->
      <line x1="0" y1="15" x2="0" y2="50" stroke="#E74C3C" stroke-width="3"/>
      <circle cx="0" cy="52" r="6" fill="none" stroke="#E74C3C" stroke-width="2"/>
    </g>

    <!-- Bolt icon -->
    <g transform="translate(-55, 25)" opacity="0.8">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="#FFD700" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="-4" y="18" width="8" height="30" rx="1" fill="none" stroke="#FFD700" stroke-width="1.5"/>
      <!-- Thread lines -->
      <line x1="-4" y1="26" x2="4" y2="26" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
      <line x1="-4" y1="32" x2="4" y2="32" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
      <line x1="-4" y1="38" x2="4" y2="38" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Battery icon -->
    <g transform="translate(-50, -50)" opacity="0.7">
      <rect x="-15" y="-12" width="30" height="24" rx="2" fill="none" stroke="#1B7A2B" stroke-width="2"/>
      <rect x="-4" y="-16" width="8" height="4" rx="1" fill="#1B7A2B"/>
      <text x="-8" y="3" font-family="Arial" font-size="10" fill="#1B7A2B" font-weight="bold">+</text>
      <text x="3" y="3" font-family="Arial" font-size="10" fill="#1B7A2B" font-weight="bold">−</text>
    </g>

    <!-- Multimeter icon -->
    <g transform="translate(60, 55)" opacity="0.7">
      <rect x="-14" y="-20" width="28" height="35" rx="4" fill="none" stroke="#E67E22" stroke-width="2"/>
      <circle cx="0" cy="-5" r="8" fill="none" stroke="#E67E22" stroke-width="1.5"/>
      <!-- Dial -->
      <line x1="0" y1="-5" x2="5" y2="-10" stroke="#E67E22" stroke-width="1.5"/>
      <!-- Probes -->
      <line x1="-6" y1="15" x2="-6" y2="32" stroke="#E74C3C" stroke-width="2"/>
      <line x1="6" y1="15" x2="6" y2="32" stroke="#333" stroke-width="2"/>
    </g>
  </g>

  <!-- Subtitle -->
  <text x="300" y="590" text-anchor="middle" font-family="Arial" font-size="42" fill="#ffffff" font-weight="bold" letter-spacing="3">PRENSIP DE BAZ</text>
  <text x="300" y="622" text-anchor="middle" font-family="Arial" font-size="16" fill="#aaa" font-style="italic">(Basic Principles)</text>

  <!-- Content highlights -->
  <line x1="150" y1="648" x2="450" y2="648" stroke="#2E75B6" stroke-width="1" opacity="0.5"/>
  
  <text x="300" y="678" text-anchor="middle" font-family="Arial" font-size="14" fill="#ccc">Sekirite • Zouti • Syans • Sistèm</text>
  <text x="300" y="702" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">10 Chapit  •  56 Dyagram  •  Glosè Trileng  •  Egzèsis + Repons</text>

  <!-- Bottom red bar -->
  <rect x="0" y="740" width="600" height="4" fill="url(#redBar)" opacity="0.6"/>

  <!-- Slogan -->
  <rect x="100" y="770" width="400" height="36" rx="4" fill="#C0392B" opacity="0.15"/>
  <text x="300" y="795" text-anchor="middle" font-family="Arial" font-size="15" fill="#ffffff" font-weight="bold">Pat gen liv teknik nan Kreyòl! Genyen kounye a.</text>

  <!-- Publisher -->
  <text x="300" y="845" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">PA GEN PÀN LLC</text>

  <!-- Bottom red accent bar -->
  <rect x="0" y="894" width="600" height="6" fill="url(#redBar)"/>
</svg>
